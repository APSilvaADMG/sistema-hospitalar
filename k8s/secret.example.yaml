# Secret de exemplo — NÃO apply com valores reais no git.
# Copie para hospital-secrets.local.yaml (gitignore) e preencha.
#
#   kubectl apply -f k8s/secret.example.yaml   # só em demo local
#   OU:
#   kubectl create secret generic hospital-secrets -n sistema-hospitalar \
#     --from-literal=ConnectionStrings__DefaultConnection='Host=...;Password=...' \
#     --from-literal=Connect__WhatsApp__AccessToken='...' \
#     --from-literal=Connect__Collection__PixWebhookSecret='...'

apiVersion: v1
kind: Secret
metadata:
  name: hospital-secrets
  namespace: sistema-hospitalar
type: Opaque
stringData:
  # Substitua em produção (Azure Database / RDS etc.)
  ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=sistema_hospitalar;Username=postgres;Password=ALTERE_AQUI"
  ConnectionStrings__RabbitMQ: "amqp://guest:guest@rabbitmq:5672"
  # WhatsApp Meta (produção): UseMockProvider=false no ConfigMap + token abaixo
  Connect__WhatsApp__AccessToken: ""
  Connect__WhatsApp__AppSecret: ""
  Connect__WhatsApp__PhoneNumberId: ""
  Connect__WhatsApp__VerifyToken: ""
  Connect__WhatsApp__PublicWebhookUrl: ""
  # PIX PSP
  Connect__Collection__PixKey: ""
  Connect__Collection__PixWebhookSecret: ""
  Connect__Collection__PixBeneficiary: ""
  Connect__Collection__PixCity: ""
